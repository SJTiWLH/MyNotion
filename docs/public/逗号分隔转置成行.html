<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能分隔换行工具 | Excel 专用</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #f0f4ff 0%, #e8edf9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* ===== 主卡片 ===== */
        .app-wrapper {
            max-width: 960px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 40px 44px 48px;
            box-shadow:
                0 20px 60px rgba(0, 20, 50, 0.12),
                0 8px 24px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .icon-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2b7def, #1a5fc7);
            border-radius: 14px;
            color: #fff;
            font-size: 24px;
            box-shadow: 0 6px 16px rgba(43, 125, 239, 0.30);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0b1a33;
            letter-spacing: -0.3px;
        }

        .header h1 span {
            font-weight: 400;
            color: #5b6f8e;
            font-size: 16px;
            margin-left: 8px;
        }

        .header-badge {
            background: rgba(43, 125, 239, 0.10);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #2b7def;
            border: 1px solid rgba(43, 125, 239, 0.15);
            letter-spacing: 0.2px;
        }

        /* ===== 分隔符控制区 ===== */
        .delimiter-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 18px 10px 22px;
            border-radius: 60px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .delimiter-control label {
            font-size: 14px;
            font-weight: 500;
            color: #1f2a44;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .delimiter-control label svg {
            opacity: 0.6;
        }

        .delimiter-input-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 140px;
        }

        .delimiter-input-group input {
            flex: 1;
            min-width: 60px;
            padding: 8px 14px;
            border: 1.5px solid #dce3ef;
            border-radius: 40px;
            font-size: 14px;
            background: #ffffff;
            color: #0b1a33;
            transition: 0.2s;
            outline: none;
            font-family: inherit;
        }

        .delimiter-input-group input:focus {
            border-color: #2b7def;
            box-shadow: 0 0 0 4px rgba(43, 125, 239, 0.12);
        }

        .delimiter-input-group input::placeholder {
            color: #a5b6cf;
        }

        .delimiter-presets {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .delimiter-presets button {
            padding: 4px 14px;
            border: 1.5px solid transparent;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            background: #f0f4fe;
            color: #1f2a44;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
        }

        .delimiter-presets button:hover {
            background: #e3eaf9;
            border-color: #cbd8ed;
        }

        .delimiter-presets button.active {
            background: #2b7def;
            color: #fff;
            border-color: #2b7def;
            box-shadow: 0 4px 12px rgba(43, 125, 239, 0.25);
        }

        .delimiter-presets button:active {
            transform: scale(0.96);
        }

        /* ===== 双栏输入输出 ===== */
        .editor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 4px;
        }

        @media (max-width: 680px) {
            .editor-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }

        .editor-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 18px 20px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.03);
            transition: 0.2s;
        }

        .editor-card:hover {
            border-color: rgba(43, 125, 239, 0.10);
        }

        .editor-card .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .editor-card .label-row label {
            font-weight: 600;
            font-size: 14px;
            color: #1f2a44;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .editor-card .label-row .count-badge {
            font-size: 12px;
            font-weight: 500;
            color: #5b6f8e;
            background: #f0f4fe;
            padding: 2px 12px;
            border-radius: 40px;
        }

        .editor-card textarea {
            width: 100%;
            height: 200px;
            padding: 14px 16px;
            border: 1.5px solid #eef2f8;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.7;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            resize: vertical;
            transition: 0.2s;
            background: #fafcff;
            color: #0b1a33;
            outline: none;
        }

        .editor-card textarea:focus {
            border-color: #2b7def;
            box-shadow: 0 0 0 4px rgba(43, 125, 239, 0.06);
            background: #ffffff;
        }

        .editor-card textarea::placeholder {
            color: #b2c3db;
        }

        .editor-card textarea[readonly] {
            background: #f6f9ff;
            cursor: default;
        }

        .editor-card textarea[readonly]:focus {
            border-color: #dce3ef;
            box-shadow: none;
        }

        /* ===== 按钮组 ===== */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border: none;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: 0.18s;
            background: #f0f4fe;
            color: #1f2a44;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .btn svg {
            flex-shrink: 0;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .btn:active {
            transform: scale(0.97);
            box-shadow: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2b7def, #1a5fc7);
            color: #fff;
            box-shadow: 0 6px 18px rgba(43, 125, 239, 0.28);
        }

        .btn-primary:hover {
            box-shadow: 0 10px 28px rgba(43, 125, 239, 0.35);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #00b42a, #008f21);
            color: #fff;
            box-shadow: 0 6px 18px rgba(0, 180, 42, 0.25);
        }

        .btn-success:hover {
            box-shadow: 0 10px 28px rgba(0, 180, 42, 0.32);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #f0f2f7;
            color: #4a5a72;
        }

        .btn-danger:hover {
            background: #fde8e8;
            color: #c72a2a;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #dce3ef;
        }

        .btn-outline:hover {
            border-color: #2b7def;
            background: rgba(43, 125, 239, 0.04);
        }

        /* ===== Toast 提示 ===== */
        .toast {
            margin-top: 16px;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.25s;
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            background: #f0f7ff;
            color: #1f5bb5;
            border: 1px solid rgba(43, 125, 239, 0.12);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .toast.success {
            background: #edfaf0;
            color: #0f7b2a;
            border-color: rgba(0, 180, 42, 0.15);
        }

        .toast.warning {
            background: #fff8ed;
            color: #b06a1a;
            border-color: rgba(255, 170, 0, 0.15);
        }

        .toast.error {
            background: #fdeeef;
            color: #b32a2a;
            border-color: rgba(255, 70, 70, 0.12);
        }

        .toast .toast-icon {
            font-size: 18px;
        }

        /* ===== 底部 ===== */
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #8899b5;
            letter-spacing: 0.3px;
            border-top: 1px solid rgba(0, 0, 0, 0.03);
            padding-top: 20px;
        }

        .footer kbd {
            background: #eef2f8;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 12px;
            font-family: inherit;
            color: #3a4b66;
            border: 1px solid #dce3ef;
        }

        /* ===== 响应式微调 ===== */
        @media (max-width: 500px) {
            .app-wrapper {
                padding: 24px 16px 28px;
                border-radius: 24px;
            }
            .header h1 {
                font-size: 20px;
            }
            .header h1 span {
                font-size: 14px;
                display: block;
                margin-left: 0;
                margin-top: 2px;
            }
            .delimiter-control {
                padding: 12px 16px;
                border-radius: 20px;
                flex-direction: column;
                align-items: stretch;
            }
            .delimiter-input-group {
                min-width: unset;
            }
            .btn {
                padding: 8px 16px;
                font-size: 13px;
            }
            .editor-card textarea {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    
<div style="margin:16px auto 0;max-width:960px;width:calc(100% - 48px);">
  <a href="/tools.html" style="
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:#2b7def;
    font-size:14px;
    text-decoration:none;
    padding:6px 14px;
    background:rgba(43,125,239,0.08);
    border-radius:40px;
    border:1px solid rgba(43,125,239,0.15);
    transition:0.2s ease;
  " onmouseover="this.style.background='rgba(43,125,239,0.15)'" onmouseout="this.style.background='rgba(43,125,239,0.08)'">
    ← 返回工具首页
  </a>
</div>

    <div class="app-wrapper">

        <!-- ===== 头部 ===== -->
        <div class="header">
            <div class="header-left">
                <div class="icon-badge">⤵</div>
                <h1>
                    分隔换行器
                    <span>Excel 专用</span>
                </h1>
            </div>
            <div class="header-badge">⚡ 批量 · 智能</div>
        </div>

        <!-- ===== 分隔符控制 ===== -->
        <div class="delimiter-control">
            <label>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                分隔符
            </label>
            <div class="delimiter-input-group">
                <input
                id="delimiterInput"
                type="text"
                value=","
                placeholder="输入分隔符…"
                spellcheck="false"
                />
            </div>
            <div class="delimiter-presets">
                <button data-delim="," class="active">逗号 ,</button>
                <button data-delim="、">顿号 、</button>
                <button data-delim="; ">分号 ;</button>
                <button data-delim="|">竖线 |</button>
                <button data-delim="\t">制表符</button>
            </div>
        </div>

        <!-- ===== 双栏编辑器 ===== -->
        <div class="editor-grid">
            <!-- 输入 -->
            <div class="editor-card">
                <div class="label-row">
                    <label>
                        📥 原始数据
                        <span class="count-badge" id="inputCount">0 项</span>
                    </label>
                </div>
                <textarea
                id="inputArea"
                placeholder="粘贴待处理的内容，例如：&#10;公司A,公司B,姓名C,项目D,测试数据"
                spellcheck="false"
                ></textarea>
            </div>

            <!-- 输出 -->
            <div class="editor-card">
                <div class="label-row">
                    <label>
                        📤 换行结果
                        <span class="count-badge" id="outputCount">0 行</span>
                    </label>
                </div>
                <textarea
                id="outputArea"
                readonly
                placeholder="转换后的结果将显示在这里…"
                spellcheck="false"
                ></textarea>
            </div>
        </div>

        <!-- ===== 操作栏 ===== -->
        <div class="action-bar">
            <div class="btn-group">
                <button class="btn btn-primary" id="convertBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                    一键换行
                </button>
                <button class="btn btn-success" id="copyBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    复制结果
                </button>
                <button class="btn btn-outline" id="clearBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
                    清空
                </button>
            </div>
            <span style="font-size:13px;color:#8899b5;display:flex;align-items:center;gap:6px;">
                <kbd>Ctrl+Enter</kbd> 快速转换
            </span>
        </div>

        <!-- ===== Toast 提示 ===== -->
        <div class="toast" id="toast">
            <span class="toast-icon">✅</span>
            <span id="toastMsg">操作成功</span>
        </div>

        <!-- ===== 底部 ===== -->
        <div class="footer">
            支持任意分隔符 · 自动去空格 · 空值过滤 · 直接粘贴 Excel
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---- DOM refs ----
            const inputArea = document.getElementById('inputArea');
            const outputArea = document.getElementById('outputArea');
            const delimiterInput = document.getElementById('delimiterInput');
            const convertBtn = document.getElementById('convertBtn');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const inputCount = document.getElementById('inputCount');
            const outputCount = document.getElementById('outputCount');

            // ---- 预设分隔符按钮 ----
            const presetBtns = document.querySelectorAll('.delimiter-presets button');

            // ---- 状态 ----
            let toastTimer = null;

            // ---- 工具：显示 Toast ----
            function showToast(message, type) {
                type = type || 'success';
                const iconMap = {
                    success: '✅',
                    warning: '⚠️',
                    error: '❌',
                    info: '💡'
                };
                toast.className = 'toast ' + type;
                toastMsg.textContent = message;
                toast.querySelector('.toast-icon').textContent = iconMap[type] || '💡';

                // 清除旧定时器
                if (toastTimer) clearTimeout(toastTimer);

                // 显示
                toast.classList.add('show');

                // 3.5 秒后自动隐藏
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                    toastTimer = null;
                }, 3200);
            }

            // ---- 核心：转换 ----
            function convert() {
                const raw = inputArea.value;
                if (!raw.trim()) {
                    showToast('请先在左侧粘贴数据', 'warning');
                    outputArea.value = '';
                    updateCounts();
                    return;
                }

                // 获取分隔符（支持转义：\t -> 制表符）
                let delim = delimiterInput.value;
                if (delim === '\\t') delim = '\t';
                if (delim === '') delim = ','; // 默认回退

                // 分割 → 清理 → 过滤空项
                const items = raw.split(delim)
                    .map(s => s.trim())
                    .filter(s => s !== '');

                if (items.length === 0) {
                    showToast('未识别到有效数据，请检查分隔符', 'error');
                    outputArea.value = '';
                    updateCounts();
                    return;
                }

                const result = items.join('\n');
                outputArea.value = result;
                updateCounts();

                showToast(`✅ 转换完成，共 ${items.length} 项`, 'success');
            }

            // ---- 更新计数 ----
            function updateCounts() {
                const raw = inputArea.value;
                const out = outputArea.value;

                // 输入计数：按当前分隔符估算
                let delim = delimiterInput.value;
                if (delim === '\\t') delim = '\t';
                if (delim === '') delim = ',';
                const parts = raw.split(delim).map(s => s.trim()).filter(s => s !== '');
                inputCount.textContent = parts.length + ' 项';

                // 输出计数：按行数
                const lines = out.split('\n').filter(s => s.trim() !== '');
                outputCount.textContent = lines.length + ' 行';
            }

            // ---- 复制 ----
            function copyResult() {
                const val = outputArea.value;
                if (!val.trim()) {
                    showToast('暂无内容可复制', 'warning');
                    return;
                }

                // 使用现代 Clipboard API
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(val).then(() => {
                        showToast('✅ 已复制，可直接粘贴 Excel', 'success');
                    }).catch(() => {
                        // fallback
                        fallbackCopy(val);
                    });
                } else {
                    fallbackCopy(val);
                }
            }

            function fallbackCopy(text) {
                outputArea.select();
                try {
                    document.execCommand('copy');
                    showToast('✅ 已复制，可直接粘贴 Excel', 'success');
                } catch (e) {
                    showToast('复制失败，请手动选择复制', 'error');
                }
                // 取消选择
                window.getSelection().removeAllRanges();
            }

            // ---- 清空 ----
            function clearAll() {
                inputArea.value = '';
                outputArea.value = '';
                updateCounts();
                showToast('已清空', 'info');
                inputArea.focus();
            }

            // ---- 预设分隔符点击 ----
            presetBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const val = this.dataset.delim;
                    delimiterInput.value = val;
                    // 高亮
                    presetBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    // 触发重新计数（分隔符变了）
                    updateCounts();
                    // 自动转换？ 不自动，等待用户点击，更可控
                });
            });

            // ---- 监听分隔符输入变化 ----
            delimiterInput.addEventListener('input', function() {
                // 移除所有预设的高亮
                presetBtns.forEach(b => b.classList.remove('active'));
                // 如果输入的值匹配某个预设，高亮它
                const val = this.value;
                presetBtns.forEach(b => {
                    if (b.dataset.delim === val) {
                        b.classList.add('active');
                    }
                });
                updateCounts();
            });

            // ---- 监听输入框变化，更新计数 ----
            inputArea.addEventListener('input', updateCounts);

            // ---- 键盘快捷键：Ctrl+Enter 转换 ----
            inputArea.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    e.preventDefault();
                    convert();
                }
            });

            // ---- 按钮绑定 ----
            convertBtn.addEventListener('click', convert);
            copyBtn.addEventListener('click', copyResult);
            clearBtn.addEventListener('click', clearAll);

            // ---- 初始化 ----
            updateCounts();

            // 如果输入框有内容，自动转换一次（方便预览）
            // 但为了不干扰用户，不自动转换，只计数。

            // 额外：点击输出框自动全选（方便复制）
            outputArea.addEventListener('focus', function() {
                this.select();
            });

            // 额外：如果用户双击输出框，复制
            outputArea.addEventListener('dblclick', function() {
                copyResult();
            });

            console.log('✨ 分隔换行工具已加载');
            console.log('💡 支持自定义分隔符，Ctrl+Enter 快速转换');
        })();
    </script>

</body>
</html>
