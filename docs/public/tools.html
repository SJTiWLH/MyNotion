<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工具集 · 极简</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0e;
            font-family: -apple-system, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 32px 20px;
            background-image: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.04) 0%, transparent 60%);
        }

        .tools-container {
            max-width: 1040px;
            width: 100%;
            padding: 8px 4px;
        }

        /* 头部 */
        .page-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px 20px;
            margin-bottom: 48px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .header-left {
            display: flex;
            align-items: baseline;
            gap: 20px;
        }

        .header-left h1 {
            font-size: 32px;
            font-weight: 400;
            letter-spacing: -0.5px;
            color: #f8fafc;
        }

        .header-left h1 span {
            font-weight: 300;
            color: #6b7280;
        }

        .header-left .badge {
            font-size: 13px;
            font-weight: 400;
            color: #9ca3af;
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
        }

        .header-right {
            font-size: 14px;
            color: #6b7280;
            letter-spacing: 0.3px;
        }

        .header-right a {
            color: #6b7280;
            text-decoration: none;
            transition: 0.2s;
            border-bottom: 1px solid transparent;
        }

        .header-right a:hover {
            color: #f1f5f9;
            border-bottom-color: #3b82f6;
        }

        /* 网格 */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .tool-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            text-decoration: none;
            color: #e2e8f0;
            transition: all 0.25s ease;
            cursor: pointer;
            position: relative;
        }

        .tool-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.03);
            transform: translateY(-2px);
        }

        .tool-card:active {
            transform: scale(0.98);
        }

        .tool-card .icon {
            font-size: 22px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .tool-card .info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .tool-card .info .name {
            font-size: 15px;
            font-weight: 450;
            color: #f1f5f9;
            letter-spacing: -0.2px;
            line-height: 1.3;
        }

        .tool-card .info .tag {
            font-size: 11px;
            font-weight: 400;
            color: #6b7280;
            background: rgba(255, 255, 255, 0.04);
            padding: 0 10px;
            border-radius: 6px;
            line-height: 20px;
            display: inline-block;
            margin-top: 3px;
            align-self: flex-start;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                margin-bottom: 32px;
            }
            .header-left h1 {
                font-size: 26px;
            }
            .header-left {
                flex-wrap: wrap;
                gap: 10px;
            }
            .tools-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .tool-card {
                padding: 14px 16px;
            }
            .tool-card .icon {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            .tool-card .info .name {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .tools-grid {
                grid-template-columns: 1fr;
            }
            .header-left h1 {
                font-size: 22px;
            }
            .header-left .badge {
                font-size: 12px;
                padding: 0 12px;
            }
            body {
                padding: 20px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="tools-container">
        <!-- 头部 -->
        <div class="page-header">
            <div class="header-left">
                <h1>工具<span>集</span></h1>
                <span class="badge">5 项</span>
            </div>
            <div class="header-right">
                <a href="/">⌘ 返回</a>
            </div>
        </div>

        <!-- 工具网格 -->
        <div class="tools-grid">
            <a href="/逗号分隔转置成行.html" class="tool-card" target="_blank">
                <span class="icon">⤵</span>
                <div class="info">
                    <span class="name">逗号转置成行</span>
                    <span class="tag">数据处理</span>
                </div>
            </a>

            <a href="/抽奖.html" class="tool-card" target="_blank">
                <span class="icon">✦</span>
                <div class="info">
                    <span class="name">幸运抽奖</span>
                    <span class="tag">活动</span>
                </div>
            </a>

            <a href="/微信聊天记录生成工具.html" class="tool-card" target="_blank">
                <span class="icon">◈</span>
                <div class="info">
                    <span class="name">微信记录生成</span>
                    <span class="tag">社交</span>
                </div>
            </a>

            <a href="/电影场次随机分配.html" class="tool-card" target="_blank">
                <span class="icon">⊞</span>
                <div class="info">
                    <span class="name">电影场次分配</span>
                    <span class="tag">团建</span>
                </div>
            </a>

            <a href="/共产党宣言.html" class="tool-card" target="_blank">
                <span class="icon">☰</span>
                <div class="info">
                    <span class="name">共产党宣言</span>
                    <span class="tag">阅读</span>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
