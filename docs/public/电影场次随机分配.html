<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎬 团建电影分组 · 可拖拽编辑 + 导入</title>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 20px;
        }

        .app-container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
            padding: 32px 36px 40px;
            transition: all 0.2s;
        }

        /* ===== 头部 ===== */
        .app-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            border-bottom: 2px solid #eef3f8;
            padding-bottom: 20px;
            flex-wrap: wrap;
        }

        .app-header .icon {
            font-size: 34px;
            line-height: 1;
        }

        .app-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1a2634;
            letter-spacing: -0.3px;
        }

        .app-header .sub {
            font-size: 15px;
            color: #6b7a8a;
            font-weight: 400;
            margin-left: 6px;
        }

        .app-header .badge {
            margin-left: auto;
            background: #e8edf4;
            color: #2c3e50;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
        }

        /* ===== 表单 ===== */
        .input-section {
            background: #f7fafc;
            border-radius: 18px;
            padding: 24px 28px;
            margin-bottom: 28px;
            border: 1px solid #e6edf4;
        }

        .section-title {
            font-weight: 600;
            font-size: 16px;
            color: #1a2634;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .hint {
            font-weight: 400;
            font-size: 13px;
            color: #7a8b9e;
        }

        .session-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }

        .session-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: white;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #e0e8f0;
            transition: 0.1s;
        }

        .session-row:hover {
            border-color: #c0cedc;
        }

        .session-row label {
            font-weight: 500;
            color: #2c3e50;
            font-size: 14px;
            min-width: 40px;
        }

        .session-row input[type="text"] {
            flex: 2;
            min-width: 80px;
            padding: 8px 12px;
            border: 1.5px solid #d0dae6;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            transition: 0.2s;
            outline: none;
        }

        .session-row input[type="number"] {
            width: 80px;
            padding: 8px 12px;
            border: 1.5px solid #d0dae6;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            transition: 0.2s;
            outline: none;
        }

        .session-row input:focus {
            border-color: #4f8cf7;
            box-shadow: 0 0 0 3px rgba(79, 140, 247, 0.10);
        }

        .session-row .del-btn {
            background: none;
            border: none;
            color: #b0c0d4;
            font-size: 20px;
            cursor: pointer;
            padding: 0 6px;
            transition: 0.2s;
            line-height: 1;
        }

        .session-row .del-btn:hover {
            color: #e74c3c;
            transform: scale(1.1);
        }

        .add-session-btn {
            background: #eef3f8;
            border: 2px dashed #cbd8e8;
            border-radius: 12px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            color: #3d5064;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .add-session-btn:hover {
            background: #e2e9f2;
            border-color: #a0b8d0;
        }

        .add-session-btn:active {
            transform: scale(0.97);
        }

        .textarea-wrapper {
            margin-top: 18px;
        }

        .textarea-wrapper textarea {
            width: 100%;
            min-height: 180px;
            padding: 14px 18px;
            border: 1.5px solid #d0dae6;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.7;
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: white;
            resize: vertical;
            transition: 0.2s;
            outline: none;
            color: #1e2a36;
        }

        .textarea-wrapper textarea:focus {
            border-color: #4f8cf7;
            box-shadow: 0 0 0 4px rgba(79, 140, 247, 0.10);
        }

        .textarea-wrapper .format-hint {
            font-size: 13px;
            color: #7a8b9e;
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 14px;
        }

        .format-hint .sep {
            display: inline-block;
            background: #e8edf4;
            padding: 0 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #3f4f62;
        }

        .format-hint .example {
            color: #2c3e50;
            font-weight: 500;
            background: #eef3f8;
            padding: 2px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
            align-items: center;
        }

        .btn-primary {
            background: #1f2a38;
            color: white;
            border: none;
            padding: 12px 38px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(26, 38, 52, 0.20);
        }

        .btn-primary:hover {
            background: #2c3d52;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 38, 52, 0.25);
        }

        .btn-primary:active {
            transform: translateY(0px);
            box-shadow: 0 2px 8px rgba(26, 38, 52, 0.15);
        }

        .btn-secondary {
            background: #eef3f8;
            color: #2c3e50;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: #e2e9f2;
        }

        .btn-secondary:active {
            background: #d5dee9;
        }

        .btn-import {
            background: #e8f0fe;
            color: #1f5b9e;
            border: 2px solid #c5d9f0;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-import:hover {
            background: #d0e2fc;
            border-color: #8bb3e0;
        }

        /* ===== 统计条 ===== */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 40px;
            background: #f7fafc;
            border-radius: 16px;
            padding: 14px 24px;
            margin-bottom: 24px;
            border: 1px solid #e6edf4;
        }

        .stats-bar .stat-item {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 14px;
            color: #3d5064;
        }

        .stats-bar .stat-item .num {
            font-weight: 700;
            font-size: 20px;
            color: #1a2634;
            margin-right: 2px;
        }

        .stats-bar .stat-item .label {
            font-weight: 400;
        }

        /* ===== 结果区域 ===== */
        .result-section {
            margin-top: 8px;
        }

        .result-section .empty-tip {
            text-align: center;
            padding: 50px 20px;
            color: #8b9cad;
            font-size: 16px;
            background: #fafcfd;
            border-radius: 20px;
            border: 2px dashed #dae2ec;
        }

        .result-section .empty-tip .big-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        /* ===== 场次卡片 ===== */
        .session-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        @media (max-width: 700px) {
            .session-grid {
                grid-template-columns: 1fr;
            }
            .app-container {
                padding: 20px 16px;
            }
            .input-section {
                padding: 18px 16px;
            }
            .app-header h1 {
                font-size: 20px;
            }
            .app-header .sub {
                font-size: 13px;
                display: block;
                margin-left: 0;
            }
            .stats-bar {
                gap: 12px 20px;
                padding: 12px 16px;
            }
            .session-row {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .session-row .del-btn {
                align-self: flex-end;
            }
        }

        .session-card {
            background: #ffffff;
            border-radius: 18px;
            border: 1px solid #e6edf4;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: 0.15s;
        }

        .session-card:hover {
            border-color: #cbd8e8;
            box-shadow: 0 6px 18px rgba(0, 20, 40, 0.06);
        }

        .session-card.drag-over {
            border-color: #4f8cf7;
            box-shadow: 0 0 0 3px rgba(79, 140, 247, 0.25);
            background: #f8fbff;
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px 12px;
            background: #f9fbfd;
            border-bottom: 1px solid #eef3f8;
            flex-wrap: wrap;
            gap: 6px 12px;
        }

        .session-header .title {
            font-weight: 700;
            font-size: 17px;
            color: #1a2634;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .session-header .title .num-badge {
            background: #1f2a38;
            color: white;
            border-radius: 30px;
            padding: 0 12px;
            font-size: 13px;
            font-weight: 600;
            line-height: 24px;
        }

        .session-header .capacity-badge {
            font-size: 12px;
            color: #7a8b9e;
            background: #eef3f8;
            padding: 2px 12px;
            border-radius: 20px;
        }

        .session-header .capacity-badge.warning {
            background: #fff3e0;
            color: #e67e22;
        }

        .session-header .dept-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .session-header .dept-tags .tag {
            font-size: 12px;
            font-weight: 500;
            padding: 2px 12px;
            border-radius: 20px;
            background: #eef3f8;
            color: #2c3e50;
            letter-spacing: 0.2px;
        }

        .session-body {
            padding: 12px 20px 12px;
            min-height: 60px;
            background: #fcfdff;
            transition: 0.1s;
        }

        .session-body .people-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 8px;
            min-height: 40px;
        }

        .session-body .people-list .person {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            padding: 4px 8px 4px 6px;
            border-radius: 30px;
            background: #f4f8fe;
            border: 1.5px solid #e6edf4;
            transition: 0.1s;
            font-weight: 500;
            color: #1a2634;
            cursor: grab;
            user-select: none;
            position: relative;
        }

        .session-body .people-list .person:active {
            cursor: grabbing;
        }

        .session-body .people-list .person.dragging {
            opacity: 0.4;
            transform: scale(0.95);
        }

        .session-body .people-list .person .dept-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .session-body .people-list .person .pname {
            font-weight: 500;
        }

        .session-body .people-list .person .pdept {
            font-weight: 400;
            color: #6b7a8a;
            font-size: 12px;
            margin-left: 2px;
        }

        .session-body .people-list .person .remove-person {
            background: none;
            border: none;
            color: #b0c0d4;
            font-size: 16px;
            cursor: pointer;
            padding: 0 2px 0 4px;
            line-height: 1;
            transition: 0.15s;
            border-radius: 50%;
        }

        .session-body .people-list .person .remove-person:hover {
            color: #e74c3c;
            background: #fde8e8;
        }

        .session-body .empty-hint {
            color: #b0c0d4;
            font-size: 13px;
            padding: 10px 0;
            font-style: italic;
        }

        .session-footer {
            padding: 10px 20px 14px;
            border-top: 1px solid #f0f4fa;
            background: #fafcfd;
        }

        .session-footer .add-person-form {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .session-footer .add-person-form input {
            flex: 1;
            min-width: 100px;
            padding: 6px 12px;
            border: 1.5px solid #d0dae6;
            border-radius: 20px;
            font-size: 13px;
            background: white;
            transition: 0.2s;
            outline: none;
        }

        .session-footer .add-person-form input:focus {
            border-color: #4f8cf7;
            box-shadow: 0 0 0 3px rgba(79, 140, 247, 0.10);
        }

        .session-footer .add-person-form input::placeholder {
            color: #b0c0d4;
            font-size: 12px;
        }

        .session-footer .add-person-form .add-btn {
            background: #eef3f8;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #2c3e50;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
        }

        .session-footer .add-person-form .add-btn:hover {
            background: #d5dee9;
        }

        .session-footer .add-person-form .add-btn:active {
            transform: scale(0.95);
        }

        /* ===== 导入模态框 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 24px;
            max-width: 700px;
            width: 100%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
            padding: 28px 32px 32px;
        }

        .modal-box h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1a2634;
            margin-bottom: 8px;
        }

        .modal-box .modal-desc {
            font-size: 14px;
            color: #6b7a8a;
            margin-bottom: 16px;
        }

        .modal-box textarea {
            flex: 1;
            min-height: 300px;
            padding: 14px 16px;
            border: 1.5px solid #d0dae6;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.6;
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: #fafcfd;
            resize: vertical;
            outline: none;
            transition: 0.2s;
        }

        .modal-box textarea:focus {
            border-color: #4f8cf7;
            box-shadow: 0 0 0 4px rgba(79, 140, 247, 0.10);
        }

        .modal-box .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .modal-box .modal-actions button {
            padding: 10px 30px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: 0.15s;
        }

        .modal-box .modal-actions .btn-confirm {
            background: #1f2a38;
            color: white;
        }

        .modal-box .modal-actions .btn-confirm:hover {
            background: #2c3d52;
        }

        .modal-box .modal-actions .btn-cancel {
            background: #eef3f8;
            color: #2c3e50;
        }

        .modal-box .modal-actions .btn-cancel:hover {
            background: #d5dee9;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a2634;
            color: white;
            padding: 12px 32px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            opacity: 0;
            transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0px);
        }

        /* ===== 滚动条 ===== */
        textarea::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track {
            background: #eef3f8;
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #cbd8e8;
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #b0c0d4;
        }

        /* 辅助 */
        .mt-8 {
            margin-top: 8px;
        }
        .text-muted {
            color: #7a8b9e;
            font-size: 14px;
        }
        .flex-center {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>


<div style="margin:16px auto 0;max-width:960px;width:calc(100% - 48px);">
  <a href="/tools.html" style="
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:#2b7def;
    font-size:14px;
    text-decoration:none;
    padding:6px 14px;
    background:rgba(43,125,239,0.08);
    border-radius:40px;
    border:1px solid rgba(43,125,239,0.15);
    transition:0.2s ease;
  " onmouseover="this.style.background='rgba(43,125,239,0.15)'" onmouseout="this.style.background='rgba(43,125,239,0.08)'">
    ← 返回工具首页
  </a>
</div>

    <div class="app-container" id="app">
        <!-- 头部 -->
        <header class="app-header">
            <span class="icon">🎬</span>
            <div>
                <h1>团建电影分组 <span class="sub">可拖拽编辑 · 导入导出</span></h1>
            </div>
            <span class="badge">🖱️ 拖拽调整</span>
        </header>

        <!-- 输入区 -->
        <section class="input-section">
            <div class="section-title">
                🎞️ 电影场次
                <span class="hint">（每个场次独立设置名称和最大容纳人数）</span>
            </div>
            <div class="session-list" id="sessionList">
                <!-- 动态行由 js 渲染 -->
            </div>
            <button class="add-session-btn" id="addSessionBtn">➕ 添加场次</button>

            <div class="textarea-wrapper">
                <div class="section-title" style="margin-top:20px;">
                    👥 部门 &amp; 人员名单
                    <span class="hint">（每行一个，格式：部门-姓名）</span>
                </div>
                <textarea id="peopleInput" placeholder="每行一个人，格式：部门-姓名&#10;例如：&#10;技术部-张三&#10;技术部-李四&#10;产品部-王五">技术部-张伟
                    技术部-李娜
                    技术部-王强
                    技术部-刘洋
                    技术部-陈敏
                    产品部-赵磊
                    产品部-孙悦
                    产品部-周婷
                    产品部-吴刚
                    设计部-郑爽
                    设计部-冯晨
                    设计部-褚明
                    设计部-卫兰
                    市场部-蒋欣
                    市场部-沈月
                    市场部-韩梅
                    市场部-杨阳
                    财务部-朱莉
                    财务部-秦岚
                    财务部-尤娜
                    人事部-许晴
                    人事部-何冰
                    人事部-吕良
                </textarea>
                <div class="format-hint">
                    <span>支持分隔符：</span>
                    <span class="sep">-</span>
                    <span class="sep">:</span>
                    <span class="sep">\t</span>
                    <span class="sep">空格</span>
                    <span class="example">例如：技术部-张三</span>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-primary" id="generateBtn">🎯 生成分组</button>
                <button class="btn-secondary" id="resetBtn">⟳ 重置示例</button>
                <button class="btn-secondary" id="copyBtn">📋 复制结果</button>
                <button class="btn-import" id="importBtn">📥 导入结果</button>
            </div>
        </section>

        <!-- 统计 -->
        <div class="stats-bar" id="statsBar" style="display:none;">
            <div class="stat-item">
                <span class="num" id="statTotal">0</span>
                <span class="label">总人数</span>
            </div>
            <div class="stat-item">
                <span class="num" id="statSessions">0</span>
                <span class="label">场次数</span>
            </div>
            <div class="stat-item">
                <span class="num" id="statTotalCapacity">0</span>
                <span class="label">总容量</span>
            </div>
            <div class="stat-item">
                <span class="num" id="statDepts">0</span>
                <span class="label">部门数</span>
            </div>
            <div class="stat-item" style="color:#4f8cf7;">
                <span style="font-size:14px;">✋ 拖拽人员到其他场次 · 点击 × 删除 · 底部添加</span>
            </div>
        </div>

        <!-- 结果 -->
        <section class="result-section" id="resultSection">
            <div class="empty-tip" id="emptyTip">
                <span class="big-icon">🎞️</span>
                配置好场次和人员名单，点击「生成分组」<br />
                系统将自动混合不同部门的同事到各场次
            </div>
            <div id="sessionGridContainer" style="display:none;">
                <div class="session-grid" id="sessionGrid"></div>
            </div>
        </section>
    </div>

    <!-- 导入模态框 -->
    <div class="modal-overlay" id="importModal">
        <div class="modal-box">
            <h3>📥 导入分组结果</h3>
            <p class="modal-desc">请将之前复制的内容粘贴到下方文本框中，系统将自动还原场次和人员。</p>
            <textarea id="importTextarea" placeholder="粘贴您之前复制的分组结果文本..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" id="importCancelBtn">取消</button>
                <button class="btn-confirm" id="importConfirmBtn">确认导入</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ================================================================
        //  工具函数
        // ================================================================

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function showToast(msg, duration = 2200) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), duration);
        }

        function generateColors(count) {
            const colors = [];
            const hueStep = 360 / Math.max(count, 1);
            for (let i = 0; i < count; i++) {
                const h = (i * hueStep + 20) % 360;
                const s = 55 + Math.random() * 25;
                const l = 55 + Math.random() * 20;
                colors.push(`hsl(${h}, ${s}%, ${l}%)`);
            }
            return colors;
        }

        // ================================================================
        //  核心算法：按部门轮询分配（每场容量不同）
        // ================================================================

        function assignSessions(peopleByDept, sessionsConfig) {
            const deptMap = {};
            let totalPeople = 0;
            for (const [dept, names] of Object.entries(peopleByDept)) {
                deptMap[dept] = shuffle(names);
                totalPeople += names.length;
            }

            const totalCapacity = sessionsConfig.reduce((sum, s) => sum + s.capacity, 0);
            if (totalPeople > totalCapacity) {
                throw new Error(`总人数 ${totalPeople} 超过总容量 ${totalCapacity}，请增加容量或减少人员`);
            }

            const sessions = sessionsConfig.map(s => ({
                name: s.name,
                capacity: s.capacity,
                people: [],
                currentCount: 0
            }));

            const depts = Object.keys(deptMap);
            let totalAssigned = 0;
            let deptIndex = 0;
            let sessionIndex = 0;

            while (totalAssigned < totalPeople) {
                let dept = depts[deptIndex % depts.length];
                let list = deptMap[dept];
                if (list.length === 0) {
                    deptIndex++;
                    continue;
                }

                let found = false;
                let attempts = 0;
                while (!found && attempts < sessions.length) {
                    const s = sessions[sessionIndex % sessions.length];
                    if (s.currentCount < s.capacity) {
                        const name = list.shift();
                        s.people.push({ name, dept });
                        s.currentCount++;
                        totalAssigned++;
                        found = true;
                        sessionIndex = (sessionIndex + 1) % sessions.length;
                        deptIndex++;
                        break;
                    } else {
                        sessionIndex = (sessionIndex + 1) % sessions.length;
                        attempts++;
                    }
                }

                if (!found) {
                    throw new Error('分配失败：没有可用场次');
                }
            }

            return sessions.map(s => ({
                name: s.name,
                capacity: s.capacity,
                people: s.people
            }));
        }

        // ================================================================
        //  解析输入
        // ================================================================

        function parsePeopleInput(text) {
            const lines = text.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0);

            const result = {};

            for (const line of lines) {
                let parts = null;
                if (line.includes('-')) {
                    parts = line.split(/-/).map(s => s.trim());
                } else if (line.includes(':')) {
                    parts = line.split(/:/).map(s => s.trim());
                } else if (line.includes('\t')) {
                    parts = line.split(/\t/).map(s => s.trim());
                } else if (/\s{2,}/.test(line)) {
                    parts = line.split(/\s{2,}/).map(s => s.trim());
                } else if (line.includes(' ')) {
                    const idx = line.indexOf(' ');
                    const dept = line.substring(0, idx).trim();
                    const name = line.substring(idx + 1).trim();
                    if (dept && name) {
                        parts = [dept, name];
                    }
                }

                if (parts && parts.length >= 2) {
                    const dept = parts[0];
                    const name = parts.slice(1).join('-');
                    if (dept && name) {
                        if (!result[dept]) result[dept] = [];
                        result[dept].push(name);
                    }
                } else {
                    console.warn('无法解析行:', line);
                }
            }

            return result;
        }

        // ================================================================
        //  全局状态
        // ================================================================

        let currentSessions = []; // 当前分组数据
        let colorMap = {}; // 部门颜色映射

        // ================================================================
        //  渲染可编辑结果
        // ================================================================

        function renderEditableResult(sessions, totalCapacity) {
            const grid = document.getElementById('sessionGrid');
            const container = document.getElementById('sessionGridContainer');
            const emptyTip = document.getElementById('emptyTip');
            const statsBar = document.getElementById('statsBar');

            if (!sessions || sessions.length === 0 || sessions.every(s => s.people.length === 0)) {
                container.style.display = 'none';
                emptyTip.style.display = 'block';
                statsBar.style.display = 'none';
                return;
            }

            emptyTip.style.display = 'none';
            container.style.display = 'block';
            statsBar.style.display = 'flex';

            // 更新统计
            const totalPeople = sessions.reduce((sum, s) => sum + s.people.length, 0);
            document.getElementById('statTotal').textContent = totalPeople;
            document.getElementById('statSessions').textContent = sessions.length;
            document.getElementById('statTotalCapacity').textContent = totalCapacity;
            const allDepts = new Set();
            sessions.forEach(s => s.people.forEach(p => allDepts.add(p.dept)));
            document.getElementById('statDepts').textContent = allDepts.size;

            // 更新颜色映射
            const deptArray = Array.from(allDepts);
            if (deptArray.length > 0) {
                const colors = generateColors(deptArray.length);
                deptArray.forEach((d, i) => {
                    if (!colorMap[d]) colorMap[d] = colors[i % colors.length];
                });
                // 确保已有部门颜色不变
                for (const d of Object.keys(colorMap)) {
                    if (!allDepts.has(d)) delete colorMap[d];
                }
            }

            grid.innerHTML = '';

            sessions.forEach((session, idx) => {
                const card = document.createElement('div');
                card.className = 'session-card';
                card.dataset.sessionIndex = idx;

                const deptCountMap = {};
                for (const p of session.people) {
                    deptCountMap[p.dept] = (deptCountMap[p.dept] || 0) + 1;
                }
                const deptNamesInSession = Object.keys(deptCountMap);

                // ---- header ----
                const header = document.createElement('div');
                header.className = 'session-header';

                const title = document.createElement('div');
                title.className = 'title';
                const peopleCount = session.people.length;
                const cap = session.capacity || '∞';
                const isOver = cap !== '∞' && peopleCount > cap;
                title.innerHTML = `
                    🎬 ${session.name || `第 ${idx + 1} 场`}
                    <span class="num-badge">${peopleCount} 人</span>
                    <span class="capacity-badge ${isOver ? 'warning' : ''}">容量 ${cap}</span>
                    ${isOver ? '⚠️' : ''}
                `;
                header.appendChild(title);

                const tags = document.createElement('div');
                tags.className = 'dept-tags';
                for (const d of deptNamesInSession) {
                    const tag = document.createElement('span');
                    tag.className = 'tag';
                    tag.style.background = colorMap[d] || '#eef3f8';
                    tag.style.color = '#1a2634';
                    tag.textContent = `${d} ${deptCountMap[d]}人`;
                    tags.appendChild(tag);
                }
                header.appendChild(tags);
                card.appendChild(header);

                // ---- body (可拖拽放置区域) ----
                const body = document.createElement('div');
                body.className = 'session-body';
                body.dataset.sessionIndex = idx;

                body.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    this.closest('.session-card').classList.add('drag-over');
                });

                body.addEventListener('dragleave', function(e) {
                    this.closest('.session-card').classList.remove('drag-over');
                });

                body.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.closest('.session-card').classList.remove('drag-over');
                    const rawData = e.dataTransfer.getData('text/plain');
                    if (!rawData) return;
                    try {
                        const data = JSON.parse(rawData);
                        handleDrop(data.fromSessionIndex, data.personIndex, parseInt(this.dataset.sessionIndex));
                    } catch (err) {
                        showToast('拖拽数据解析失败', 1500);
                    }
                });

                const list = document.createElement('div');
                list.className = 'people-list';

                if (session.people.length === 0) {
                    const hint = document.createElement('div');
                    hint.className = 'empty-hint';
                    hint.textContent = '🫥 暂无人员，从其他场次拖入或底部添加';
                    list.appendChild(hint);
                } else {
                    session.people.forEach((p, personIdx) => {
                        const el = document.createElement('span');
                        el.className = 'person';
                        el.draggable = true;
                        el.dataset.sessionIndex = idx;
                        el.dataset.personIndex = personIdx;

                        el.addEventListener('dragstart', function(e) {
                            const data = {
                                fromSessionIndex: parseInt(this.dataset.sessionIndex),
                                personIndex: parseInt(this.dataset.personIndex),
                                person: currentSessions[this.dataset.sessionIndex].people[this
                                    .dataset.personIndex]
                            };
                            e.dataTransfer.setData('text/plain', JSON.stringify(data));
                            e.dataTransfer.effectAllowed = 'move';
                            this.classList.add('dragging');
                        });

                        el.addEventListener('dragend', function(e) {
                            this.classList.remove('dragging');
                            document.querySelectorAll('.session-card.drag-over').forEach(el => el.classList
                                .remove('drag-over'));
                        });

                        const dot = document.createElement('span');
                        dot.className = 'dept-dot';
                        dot.style.background = colorMap[p.dept] || '#a0b8d0';
                        el.appendChild(dot);

                        const nameSpan = document.createElement('span');
                        nameSpan.className = 'pname';
                        nameSpan.textContent = p.name;
                        el.appendChild(nameSpan);

                        const deptSpan = document.createElement('span');
                        deptSpan.className = 'pdept';
                        deptSpan.textContent = `(${p.dept})`;
                        el.appendChild(deptSpan);

                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'remove-person';
                        removeBtn.textContent = '✕';
                        removeBtn.title = '从本场移除';
                        removeBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const sIdx = parseInt(el.dataset.sessionIndex);
                            const pIdx = parseInt(el.dataset.personIndex);
                            removePerson(sIdx, pIdx);
                        });
                        el.appendChild(removeBtn);

                        list.appendChild(el);
                    });
                }

                body.appendChild(list);
                card.appendChild(body);

                // ---- footer (添加人员) ----
                const footer = document.createElement('div');
                footer.className = 'session-footer';

                const form = document.createElement('div');
                form.className = 'add-person-form';

                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = '部门-姓名 (如 技术部-张三)';
                input.className = 'add-person-input';

                const addBtn = document.createElement('button');
                addBtn.className = 'add-btn';
                addBtn.textContent = '➕ 添加';
                addBtn.addEventListener('click', function() {
                    const val = input.value.trim();
                    if (!val) {
                        showToast('请输入部门-姓名', 1500);
                        return;
                    }
                    const parts = parsePersonLine(val);
                    if (!parts) {
                        showToast('格式错误，请用 部门-姓名 格式', 1500);
                        return;
                    }
                    addPerson(idx, parts.dept, parts.name);
                    input.value = '';
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addBtn.click();
                    }
                });

                form.appendChild(input);
                form.appendChild(addBtn);
                footer.appendChild(form);
                card.appendChild(footer);

                grid.appendChild(card);
            });

            currentSessions = sessions;
        }

        // ================================================================
        //  操作函数
        // ================================================================

        function parsePersonLine(line) {
            const trimmed = line.trim();
            let parts = null;
            if (trimmed.includes('-')) {
                parts = trimmed.split(/-/).map(s => s.trim());
            } else if (trimmed.includes(':')) {
                parts = trimmed.split(/:/).map(s => s.trim());
            } else if (trimmed.includes('\t')) {
                parts = trimmed.split(/\t/).map(s => s.trim());
            } else if (/\s{2,}/.test(trimmed)) {
                parts = trimmed.split(/\s{2,}/).map(s => s.trim());
            } else if (trimmed.includes(' ')) {
                const idx = trimmed.indexOf(' ');
                const dept = trimmed.substring(0, idx).trim();
                const name = trimmed.substring(idx + 1).trim();
                if (dept && name) parts = [dept, name];
            }
            if (parts && parts.length >= 2) {
                const dept = parts[0];
                const name = parts.slice(1).join('-');
                if (dept && name) return { dept, name };
            }
            return null;
        }

        function addPerson(sessionIndex, dept, name) {
            if (sessionIndex < 0 || sessionIndex >= currentSessions.length) return;
            currentSessions[sessionIndex].people.push({ name, dept });
            if (!colorMap[dept]) {
                const allDepts = new Set();
                currentSessions.forEach(s => s.people.forEach(p => allDepts.add(p.dept)));
                const deptArray = Array.from(allDepts);
                const colors = generateColors(deptArray.length);
                deptArray.forEach((d, i) => { colorMap[d] = colors[i % colors.length]; });
            }
            reRender();
            showToast(`✅ 已添加 ${dept}-${name}`, 1200);
        }

        function removePerson(sessionIndex, personIndex) {
            if (sessionIndex < 0 || sessionIndex >= currentSessions.length) return;
            const session = currentSessions[sessionIndex];
            if (personIndex < 0 || personIndex >= session.people.length) return;
            const removed = session.people.splice(personIndex, 1)[0];
            reRender();
            showToast(`已移除 ${removed.dept}-${removed.name}`, 1200);
        }

        function handleDrop(fromSessionIdx, personIdx, toSessionIdx) {
            if (fromSessionIdx === toSessionIdx) {
                showToast('已在同一场次', 1000);
                return;
            }
            if (fromSessionIdx < 0 || fromSessionIdx >= currentSessions.length) return;
            if (toSessionIdx < 0 || toSessionIdx >= currentSessions.length) return;
            const fromSession = currentSessions[fromSessionIdx];
            if (personIdx < 0 || personIdx >= fromSession.people.length) return;

            const person = fromSession.people.splice(personIdx, 1)[0];
            currentSessions[toSessionIdx].people.push(person);
            reRender();
            showToast(`🔄 已将 ${person.dept}-${person.name} 移动到 ${currentSessions[toSessionIdx].name || '第' + (toSessionIdx+1) + '场'}`, 1500);
        }

        function reRender() {
            const totalCapacity = currentSessions.reduce((sum, s) => sum + (s.capacity || 0), 0);
            renderEditableResult(currentSessions, totalCapacity);
        }

        // ================================================================
        //  场次列表管理 (DOM)
        // ================================================================

        const sessionListEl = document.getElementById('sessionList');

        function getSessionsConfig() {
            const rows = sessionListEl.querySelectorAll('.session-row');
            const configs = [];
            rows.forEach(row => {
                const nameInput = row.querySelector('.session-name');
                const capInput = row.querySelector('.session-capacity');
                const name = nameInput.value.trim() || '未命名场次';
                const cap = parseInt(capInput.value, 10);
                if (!isNaN(cap) && cap > 0) {
                    configs.push({ name, capacity: cap });
                }
            });
            return configs;
        }

        function addSessionRow(name = '', capacity = '') {
            const row = document.createElement('div');
            row.className = 'session-row';
            row.innerHTML = `
                <label>场次名</label>
                <input type="text" class="session-name" placeholder="如：1号厅" value="${name}" />
                <label>容量</label>
                <input type="number" class="session-capacity" placeholder="人数" min="1" value="${capacity}" />
                <button class="del-btn" title="删除该场次">✕</button>
            `;
            row.querySelector('.del-btn').addEventListener('click', function() {
                if (sessionListEl.querySelectorAll('.session-row').length <= 1) {
                    showToast('至少保留一个场次', 1500);
                    return;
                }
                row.remove();
            });
            sessionListEl.appendChild(row);
        }

        document.getElementById('addSessionBtn').addEventListener('click', function() {
            addSessionRow('', '');
        });

        // ================================================================
        //  主要流程：生成
        // ================================================================

        function generate() {
            const sessionConfigs = getSessionsConfig();
            if (sessionConfigs.length === 0) {
                showToast('⚠️ 请至少添加一个有效场次（容量>0）', 2000);
                return;
            }

            const rawText = document.getElementById('peopleInput').value;
            const peopleByDept = parsePeopleInput(rawText);
            let totalPeople = 0;
            for (const list of Object.values(peopleByDept)) {
                totalPeople += list.length;
            }
            if (totalPeople === 0) {
                showToast('⚠️ 未识别到有效人员，请检查格式 (部门-姓名)', 2200);
                return;
            }

            try {
                const sessions = assignSessions(peopleByDept, sessionConfigs);
                const finalSessions = sessions.map((s, idx) => ({
                    ...s,
                    capacity: sessionConfigs[idx]?.capacity || 0
                }));
                const totalCapacity = sessionConfigs.reduce((sum, s) => sum + s.capacity, 0);
                colorMap = {};
                renderEditableResult(finalSessions, totalCapacity);
                const deptCount = Object.keys(peopleByDept).length;
                showToast(`✅ 已分配 ${totalPeople} 人 · ${sessions.length} 场 · ${deptCount} 个部门混合`, 1800);
            } catch (err) {
                showToast('⚠️ ' + err.message, 2500);
            }
        }

        // ================================================================
        //  复制结果
        // ================================================================

        function copyResult() {
            if (!currentSessions || currentSessions.length === 0 || currentSessions.every(s => s.people.length === 0)) {
                showToast('⚠️ 暂无结果可复制', 1500);
                return;
            }

            let text = '🎬 团建电影分组结果\n';
            text += `生成时间: ${new Date().toLocaleString()}\n`;
            text += '─'.repeat(40) + '\n\n';

            currentSessions.forEach((session, idx) => {
                const people = session.people.map(p => `${p.dept}-${p.name}`);
                const deptStats = {};
                session.people.forEach(p => {
                    deptStats[p.dept] = (deptStats[p.dept] || 0) + 1;
                });
                const deptStr = Object.entries(deptStats).map(([d, c]) => `${d} ${c}人`).join(' · ');
                text += `【${session.name || '第' + (idx+1) + '场'}】 (${people.length}人)  ${deptStr}\n`;
                for (const p of people) {
                    text += `  ${p}\n`;
                }
                text += '\n';
            });

            text += '─'.repeat(40) + '\n';
            text += `总场次: ${currentSessions.length} 场\n`;
            text += `总人数: ${currentSessions.reduce((sum, s) => sum + s.people.length, 0)} 人\n`;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('📋 已复制到剪贴板！', 1800);
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showToast('📋 已复制到剪贴板！', 1800);
            } catch (e) {
                showToast('⚠️ 复制失败，请手动复制', 1800);
            }
            document.body.removeChild(ta);
        }

        // ================================================================
        //  导入结果
        // ================================================================

        function parseImportedText(text) {
            const lines = text.split('\n');
            const sessions = [];
            let currentSession = null;

            for (let line of lines) {
                line = line.trim();
                if (line === '' || line.startsWith('─') || line.startsWith('总场次') || line.startsWith('总人数') || line.startsWith(
                        '生成时间')) {
                    continue;
                }

                // 检测场次标题: 【xxx】 (数字人)  部门统计...
                const titleMatch = line.match(/^【([^】]+)】\s*\((\d+)人\)/);
                if (titleMatch) {
                    if (currentSession) {
                        sessions.push(currentSession);
                    }
                    const name = titleMatch[1].trim();
                    // 容量暂时设为人数的值，后续可以调整
                    const peopleCount = parseInt(titleMatch[2], 10);
                    currentSession = {
                        name: name,
                        capacity: peopleCount, // 以人数作为默认容量
                        people: []
                    };
                    continue;
                }

                // 如果是人员行，以空格或缩进开头，且包含分隔符
                if (currentSession && line.length > 0) {
                    // 尝试解析人员，格式为 "部门-姓名" 或 "部门 姓名" 等
                    const person = parsePersonLine(line);
                    if (person) {
                        currentSession.people.push(person);
                    } else {
                        // 可能是统计行如 "总经理 1人 · ..." 跳过
                        // 如果行包含 "人" 且没有分隔符，则跳过
                        if (!line.includes('人') && !line.includes('·')) {
                            // 但有可能部门名含空格，尝试用空格分割
                            const parts = line.split(/\s+/);
                            if (parts.length >= 2) {
                                const dept = parts.slice(0, -1).join(' ');
                                const name = parts[parts.length - 1];
                                if (dept && name && !name.includes('人')) {
                                    currentSession.people.push({ dept, name });
                                }
                            }
                        }
                    }
                }
            }

            if (currentSession) {
                sessions.push(currentSession);
            }

            return sessions;
        }

        function importResult() {
            const modal = document.getElementById('importModal');
            const textarea = document.getElementById('importTextarea');
            modal.classList.add('active');
            textarea.value = '';
            textarea.focus();
        }

        function confirmImport() {
            const modal = document.getElementById('importModal');
            const textarea = document.getElementById('importTextarea');
            const rawText = textarea.value;
            if (!rawText.trim()) {
                showToast('请粘贴要导入的内容', 1500);
                return;
            }

            try {
                const sessions = parseImportedText(rawText);
                if (sessions.length === 0 || sessions.every(s => s.people.length === 0)) {
                    showToast('未能解析出有效数据，请检查格式', 2000);
                    return;
                }

                // 计算总容量（每场容量=人数）
                const totalCapacity = sessions.reduce((sum, s) => sum + s.people.length, 0);
                // 重置颜色映射
                colorMap = {};
                // 渲染
                renderEditableResult(sessions, totalCapacity);
                modal.classList.remove('active');
                showToast(`✅ 成功导入 ${sessions.length} 场，共 ${totalCapacity} 人`, 1800);
            } catch (err) {
                showToast('导入失败：' + err.message, 2000);
            }
        }

        function cancelImport() {
            document.getElementById('importModal').classList.remove('active');
        }

        // ================================================================
        //  重置示例
        // ================================================================

        function resetExample() {
            sessionListEl.innerHTML = '';
            addSessionRow('1号厅', '8');
            addSessionRow('2号厅', '6');
            addSessionRow('3号厅', '10');

            const examplePeople = `技术部-张伟
                技术部-李娜
                技术部-王强
                技术部-刘洋
                技术部-陈敏
                产品部-赵磊
                产品部-孙悦
                产品部-周婷
                产品部-吴刚
                设计部-郑爽
                设计部-冯晨
                设计部-褚明
                设计部-卫兰
                市场部-蒋欣
                市场部-沈月
                市场部-韩梅
                市场部-杨阳
                财务部-朱莉
                财务部-秦岚
                财务部-尤娜
                人事部-许晴
                人事部-何冰
                人事部-吕良`;
            document.getElementById('peopleInput').value = examplePeople;
            generate();
        }

        // ================================================================
        //  初始化
        // ================================================================

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('generateBtn').addEventListener('click', generate);
            document.getElementById('resetBtn').addEventListener('click', resetExample);
            document.getElementById('copyBtn').addEventListener('click', copyResult);
            document.getElementById('importBtn').addEventListener('click', importResult);

            // 模态框事件
            document.getElementById('importConfirmBtn').addEventListener('click', confirmImport);
            document.getElementById('importCancelBtn').addEventListener('click', cancelImport);
            // 点击背景关闭
            document.getElementById('importModal').addEventListener('click', function(e) {
                if (e.target === this) cancelImport();
            });
            // Ctrl+Enter 在 textarea 中触发确认
            document.getElementById('importTextarea').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    confirmImport();
                }
            });

            document.getElementById('peopleInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    generate();
                }
            });

            resetExample();
        });
    </script>

</body>
</html>
